<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUARE Color Studio</title>
    <!-- Load Tailwind CSS -->
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <!-- Load React -->
    <script src="[https://unpkg.com/react@18/umd/react.production.min.js](https://unpkg.com/react@18/umd/react.production.min.js)" crossorigin></script>
    <script src="[https://unpkg.com/react-dom@18/umd/react-dom.production.min.js](https://unpkg.com/react-dom@18/umd/react-dom.production.min.js)" crossorigin></script>
    <!-- Load Babel to compile JSX -->
    <script src="[https://unpkg.com/@babel/standalone/babel.min.js](https://unpkg.com/@babel/standalone/babel.min.js)"></script>
    <!-- Load Feather Icons for easy standalone icons -->
    <script src="[https://unpkg.com/feather-icons](https://unpkg.com/feather-icons)"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Simple Icon Component using Feather Icons
        const Icon = ({ name, size = 20, className = "" }) => {
            const svgRef = useRef(null);
            useEffect(() => {
                if (svgRef.current && feather.icons[name]) {
                    svgRef.current.innerHTML = feather.icons[name].toSvg({
                        width: size,
                        height: size,
                        class: className
                    });
                }
            }, [name, size, className]);
            return <span ref={svgRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const SquareLogo = ({ className = "w-10 h-10", color = "white", bgColor = "black" }) => (
            <div className={`${className} flex items-center justify-center rounded-lg shadow-inner relative overflow-hidden`} style={{ backgroundColor: bgColor }}>
                <span className="font-serif font-light text-2xl absolute -right-0 -top-1" style={{ color: color, transform: 'scale(1.2)' }}>2</span>
            </div>
        );

        const ARCHITECTURAL_THEMES = {
            square: { name: "Modern Tech (Square)", colors: ["#000000", "#FFFFFF", "#3A3A3A", "#CCCCCC", "#00D64F"], description: "Clean, high-contrast, and focused on clarity and precision." },
            calcutta: { name: "Calcutta Heritage", colors: ["#A6635B", "#F2EDE4", "#C29B40", "#738696", "#627254"], description: "Sun-bleached brick, vintage marble, and dusty ochre taxis." },
            minimalist: { name: "Minimalist Stone", colors: ["#F8F9FA", "#E9ECEF", "#DEE2E6", "#CED4DA", "#212529"], description: "Sophisticated greyscale inspired by concrete, steel, and glass." },
            scandinavian: { name: "Scandinavian Forest", colors: ["#2D3A3A", "#4A5D5D", "#9CADAD", "#E3E9E9", "#D4A373"], description: "Cool pine greens paired with warm oak and airy mist tones." },
            biophilic: { name: "Biophilic Office", colors: ["#1E352F", "#3F5E5A", "#7A918D", "#D3DCD0", "#E9F1F0"], description: "Calming, nature-focused greens and soft neutrals." }
        };

        const App = () => {
            // USER'S PERSONAL API KEY STATE
            const [apiKey, setApiKey] = useState(localStorage.getItem('square_gemini_key') || '');
            const [showKeyModal, setShowKeyModal] = useState(false);
            const [tempKeyInput, setTempKeyInput] = useState('');

            const [palette, setPalette] = useState(ARCHITECTURAL_THEMES.calcutta.colors);
            const [lockedIndices, setLockedIndices] = useState([]);
            const [themeName, setThemeName] = useState("Calcutta Heritage");
            const [viewMode, setViewMode] = useState('palette');
            const [prompt, setPrompt] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [showExportModal, setShowExportModal] = useState(false);
            const [savedPalettes, setSavedPalettes] = useState([]);
            const [toastMsg, setToastMsg] = useState(null);

            const showToast = (msg, duration = 4000) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(null), duration);
            };

            const saveApiKey = () => {
                const trimmedKey = tempKeyInput.trim();
                localStorage.setItem('square_gemini_key', trimmedKey);
                setApiKey(trimmedKey);
                setShowKeyModal(false);
                showToast("API Key securely saved to your browser!");
            };

            const toggleLock = (idx) => {
                const next = [...lockedIndices];
                if (next.includes(idx)) {
                    next.splice(next.indexOf(idx), 1);
                } else {
                    next.push(idx);
                }
                setLockedIndices(next);
            };

            const copyToClipboard = (text) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showToast(text.startsWith('#') ? `Copied ${text}` : 'Copied to clipboard');
            };

            const handleSavePalette = () => {
                const newPalette = { id: Date.now(), name: themeName, colors: [...palette] };
                setSavedPalettes([newPalette, ...savedPalettes]);
                showToast("Saved to local studio!");
            };

            // Gemini API call routing gracefully based on the environment
            const callGemini = async (payload, retries = 5, delay = 1000) => {
                if (!apiKey) {
                    setShowKeyModal(true);
                    throw new Error("API_KEY_MISSING");
                }
                
                // Use the globally available 1.5-flash for personal keys, avoiding 'preview' restrictions
                const modelToUse = (apiKey && apiKey.length > 20) ? "gemini-1.5-flash" : "gemini-2.5-flash-preview-09-2025";

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelToUse}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData?.error?.message || `HTTP Error ${response.status}`);
                    }
                    
                    return await response.json();
                } catch (error) {
                    // Don't retry if the API key is simply invalid or empty
                    if (error.message !== "API_KEY_MISSING" && !error.message.includes("API key") && retries > 0) {
                        await new Promise(r => setTimeout(r, delay));
                        return callGemini(payload, retries - 1, delay * 2);
                    }
                    throw error;
                }
            };

            const handleAiGenerate = async () => {
                if (!prompt.trim()) return;
                setIsGenerating(true);
                try {
                    const result = await callGemini({
                        contents: [{ parts: [{ text: `Create an architectural color palette with 5 hex colors based on this prompt: ${prompt}. Return ONLY a JSON object with properties "colors" (array of 5 hex strings) and "themeName" (a descriptive string).` }] }],
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    colors: { type: "ARRAY", items: { type: "STRING" } },
                                    themeName: { type: "STRING" }
                                }
                            }
                        }
                    });
                    
                    // Clean the response text to remove any markdown formatting blocks that break JSON.parse
                    let rawText = result.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
                    rawText = rawText.replace(/```json/gi, '').replace(/```/g, '').trim();
                    
                    const data = JSON.parse(rawText);
                    if (data.colors && data.colors.length === 5) {
                        setPalette(data.colors);
                        setThemeName(data.themeName);
                        setLockedIndices([]);
                        showToast("AI Palette Generated!");
                    }
                } catch (error) {
                    console.error("AI Error:", error);
                    if (error.message !== "API_KEY_MISSING") {
                        showToast(`Generation Failed: ${error.message.substring(0, 60)}...`);
                    }
                } finally {
                    setIsGenerating(false);
                }
            };

            // Enhanced AI Completion to respect specific locked indices
            const handleAiComplete = async () => {
                setIsGenerating(true);
                const lockedDetails = lockedIndices.map(i => `Position ${i + 1}: ${palette[i]}`).join(', ');
                const userQuery = `I am designing a 5-color architectural palette. I have locked these colors: ${lockedDetails}. Fill in the remaining positions to create a cohesive palette. Return ONLY a JSON object with "colors" (array of exactly 5 hex strings, keeping the locked colors at their exact positions) and "themeName".`;
                
                try {
                    const result = await callGemini({
                        contents: [{ parts: [{ text: userQuery }] }],
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    colors: { type: "ARRAY", items: { type: "STRING" } },
                                    themeName: { type: "STRING" }
                                }
                            }
                        }
                    });
                    
                    // Clean the response text to remove any markdown formatting blocks that break JSON.parse
                    let rawText = result.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
                    rawText = rawText.replace(/```json/gi, '').replace(/```/g, '').trim();
                    
                    const data = JSON.parse(rawText);
                    if (data.colors && data.colors.length === 5) {
                        // Strictly enforce that locked indices are preserved, even if AI makes a mistake
                        const finalPalette = data.colors.map((c, i) => lockedIndices.includes(i) ? palette[i] : c);
                        setPalette(finalPalette);
                        setThemeName(data.themeName || "AI Completion");
                        showToast("Palette completed!");
                    }
                } catch (error) {
                    console.error("Completion Error:", error);
                    if (error.message !== "API_KEY_MISSING") {
                        showToast(`AI Failed: ${error.message.substring(0, 60)}...`);
                    }
                } finally {
                    setIsGenerating(false);
                }
            };

            const getExportData = (type) => {
                switch (type) {
                    case 'css': return `:root {\n${palette.map((c, i) => `  --color-${i === 0 ? 'primary' : i === 1 ? 'surface' : `accent-${i}`}: ${c};`).join('\n')}\n}`;
                    case 'tailwind': return `colors: {\n  brand: {\n${palette.map((c, i) => `    ${i * 100 + 100}: '${c}',`).join('\n')}\n  }\n}`;
                    case 'json': return JSON.stringify({ theme: themeName, colors: palette }, null, 2);
                    default: return '';
                }
            };

            return (
                <div className="min-h-screen pb-20">
                    <header className="border-b bg-white px-6 py-4 flex items-center justify-between sticky top-0 z-20 shadow-sm">
                        <div className="flex items-center gap-3">
                            <SquareLogo className="w-10 h-10" />
                            <div>
                                <h1 className="font-bold text-xl tracking-tight">SQUARE <span className="text-slate-400 font-normal italic">Color Studio</span></h1>
                                <p className="text-xs text-slate-500 font-medium uppercase tracking-widest">{themeName}</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={() => setViewMode(viewMode === 'palette' ? 'preview' : 'palette')} className="px-4 py-2 text-sm font-semibold rounded-full border border-slate-200 hover:bg-slate-50 flex items-center gap-2">
                                <Icon name={viewMode === 'palette' ? 'layout' : 'aperture'} size={16} />
                                {viewMode === 'palette' ? 'Live Preview' : 'Edit Design'}
                            </button>
                            <button onClick={() => setShowExportModal(true)} className="px-4 py-2 text-sm font-semibold rounded-full bg-slate-100 hover:bg-slate-200 flex items-center gap-2 text-blue-600">
                                <Icon name="share-2" size={16} /> Export Code
                            </button>
                            <button onClick={handleSavePalette} className="p-2 text-slate-400 hover:text-black" title="Save Palette">
                                <Icon name="bookmark" size={22} />
                            </button>
                            <button onClick={() => {setTempKeyInput(apiKey); setShowKeyModal(true);}} className={`p-2 transition-colors ${apiKey ? 'text-green-500' : 'text-slate-400 hover:text-black'}`} title="AI Settings">
                                <Icon name="key" size={22} />
                            </button>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-6 mt-6">
                        
                        {/* AI Generation Bar */}
                        <div className="mb-8 flex flex-col md:flex-row gap-4">
                            <div className="flex-1 bg-white p-2 rounded-3xl border border-slate-200 shadow-sm flex items-center gap-2">
                                <div className="flex-1 relative">
                                    <input 
                                        type="text" 
                                        placeholder="Mood prompt (e.g., 'Modernism in Kolkata')" 
                                        className="w-full pl-12 pr-4 py-3 bg-transparent outline-none font-medium text-sm" 
                                        value={prompt} 
                                        onChange={(e) => setPrompt(e.target.value)} 
                                        onKeyPress={(e) => e.key === 'Enter' && handleAiGenerate()} 
                                    />
                                    <Icon name="star" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" size={20} />
                                </div>
                                <button 
                                    onClick={handleAiGenerate} 
                                    disabled={isGenerating || !prompt.trim()} 
                                    className="px-6 py-3 bg-black text-white rounded-2xl font-bold flex items-center gap-2 text-sm hover:bg-slate-800 disabled:opacity-50"
                                >
                                    {isGenerating ? <Icon name="loader" className="animate-spin" size={18} /> : <Icon name="send" size={18} />} 
                                    Generate
                                </button>
                            </div>
                            
                            {/* Complete Palette Button */}
                            <button 
                                onClick={handleAiComplete}
                                disabled={isGenerating || lockedIndices.length === 0}
                                className="bg-white border-2 border-dashed border-slate-200 rounded-3xl px-6 py-2 flex items-center justify-center gap-3 font-bold text-slate-500 hover:border-black hover:text-black transition-all disabled:opacity-30"
                            >
                                <Icon name="zap" size={18} className={lockedIndices.length > 0 ? "text-yellow-500" : ""} />
                                <div className="text-left leading-tight">
                                    <span className="block text-xs uppercase tracking-tighter opacity-60">AI Assist</span>
                                    <span className="text-sm">Complete Palette</span>
                                </div>
                            </button>
                        </div>

                        {viewMode === 'palette' ? (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <div className="grid grid-cols-1 md:grid-cols-5 h-[450px] rounded-[40px] overflow-hidden shadow-2xl bg-white border-8 border-white">
                                    {palette.map((color, idx) => (
                                        <div key={idx} style={{ backgroundColor: color }} className="group relative flex flex-col items-center justify-between py-10 transition-all hover:flex-[1.2]">
                                            <button onClick={() => toggleLock(idx)} className={`p-3 rounded-full ${lockedIndices.includes(idx) ? 'bg-black text-white' : 'bg-white/20 text-white opacity-0 group-hover:opacity-100'}`}>
                                                <Icon name={lockedIndices.includes(idx) ? 'lock' : 'unlock'} size={20} />
                                            </button>
                                            <div className="flex flex-col items-center gap-4">
                                                <button onClick={() => copyToClipboard(color)} className="opacity-0 group-hover:opacity-100 bg-white/20 p-3 rounded-full text-white border border-white/30 hover:bg-white/40">
                                                    <Icon name="copy" size={20} />
                                                </button>
                                                <div className="bg-black/90 text-white px-4 py-2 rounded-xl font-mono text-xs tracking-widest shadow-lg">
                                                    {color}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                                    <div className="lg:col-span-1 space-y-4">
                                        <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2"><Icon name="users" size={14} className="text-blue-500" /> Local Studio</h3>
                                        <div className="grid grid-cols-1 gap-3 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                                            {savedPalettes.length === 0 && <p className="text-xs text-slate-400 italic">No saved palettes yet.</p>}
                                            {savedPalettes.map(p => (
                                                <button key={p.id} onClick={() => {setPalette(p.colors); setThemeName(p.name); setLockedIndices([]);}} className="bg-white p-4 rounded-2xl border border-slate-200 hover:border-black text-left group">
                                                    <div className="flex gap-1 h-4 mb-2 rounded-md overflow-hidden">{p.colors.map((c, i) => <div key={i} style={{ backgroundColor: c }} className="flex-1" />)}</div>
                                                    <span className="text-xs font-bold block">{p.name}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="lg:col-span-3 space-y-4">
                                        <div className="flex justify-between items-center">
                                            <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2"><Icon name="layers" size={14} /> Design Reference</h3>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                            {Object.keys(ARCHITECTURAL_THEMES).map(key => (
                                                <button key={key} onClick={() => {setPalette(ARCHITECTURAL_THEMES[key].colors); setThemeName(ARCHITECTURAL_THEMES[key].name); setLockedIndices([]);}} className="bg-white p-5 rounded-3xl border border-slate-200 hover:shadow-xl text-left group transition-all">
                                                    <div className="flex gap-1 h-10 mb-4 rounded-xl overflow-hidden group-hover:scale-[1.02] transition-transform">{ARCHITECTURAL_THEMES[key].colors.map((c, i) => <div key={i} style={{ backgroundColor: c }} className="flex-1" />)}</div>
                                                    <h4 className="font-bold text-sm mb-1">{ARCHITECTURAL_THEMES[key].name}</h4>
                                                    <p className="text-[10px] text-slate-400 leading-tight">{ARCHITECTURAL_THEMES[key].description}</p>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-in zoom-in-95 duration-500">
                                <div className="lg:col-span-2">
                                    <div className="rounded-[60px] p-16 min-h-[600px] shadow-2xl relative overflow-hidden flex flex-col transition-all duration-700" style={{ backgroundColor: palette[1], color: palette[4] }}>
                                        <div className="flex justify-between items-center mb-24 relative z-10">
                                            <div className="flex items-center gap-4">
                                                <SquareLogo bgColor={palette[0]} color={palette[1]} className="w-12 h-12" />
                                                <span className="font-black text-2xl tracking-tighter">SQUARE</span>
                                            </div>
                                            <nav className="flex gap-10 font-bold text-[10px] uppercase tracking-[0.3em] opacity-60">
                                                <span>Manifesto</span><span>Archives</span><span>Atelier</span>
                                            </nav>
                                        </div>
                                        <div className="max-w-2xl mt-auto z-10 relative">
                                            <h2 className="text-8xl font-black mb-8 leading-[0.85] tracking-tighter" style={{ color: palette[0] }}>{themeName.split(' ')[0]} <br /> Aesthetics.</h2>
                                            <p className="text-2xl opacity-70 mb-12 font-medium max-w-md leading-relaxed">Developing spatial identities through precise color engineering.</p>
                                            <button className="px-12 py-6 rounded-3xl font-bold shadow-2xl hover:scale-105 transition-transform" style={{ backgroundColor: palette[0], color: palette[1] }}>Initialize Project</button>
                                        </div>
                                        <div className="absolute -right-40 -bottom-20 w-[600px] h-[600px] rounded-full blur-[160px] opacity-30 transition-colors duration-1000" style={{ backgroundColor: palette[2] }} />
                                    </div>
                                </div>
                                <div className="space-y-6">
                                    <div className="bg-white p-8 rounded-[40px] border border-slate-200 shadow-sm relative overflow-hidden">
                                        <h3 className="font-bold mb-8 text-xs flex items-center gap-2 uppercase tracking-[0.2em] text-slate-400"><Icon name="code" size={16} /> Architectural Spec</h3>
                                        <div className="space-y-5">
                                            {palette.map((c, i) => (
                                                <div key={i} className="flex items-center justify-between group">
                                                    <div className="flex items-center gap-5">
                                                        <div className="w-14 h-14 rounded-2xl shadow-md group-hover:scale-110 transition-transform" style={{ backgroundColor: c }} />
                                                        <div><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">{i === 0 ? "Structure Base" : i === 1 ? "Interior Surface" : i === 4 ? "User Interface" : `Environmental Detail ${i}`}</p><span className="font-mono text-base font-bold tracking-tight">{c}</span></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {showExportModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setShowExportModal(false)} />
                            <div className="relative bg-white w-full max-w-2xl rounded-[40px] shadow-2xl overflow-hidden animate-in zoom-in-95 duration-200">
                                <div className="p-8 border-b flex justify-between items-center">
                                    <div><h3 className="font-bold text-2xl tracking-tight">Handover Code</h3><p className="text-sm text-slate-500">Copy these snippets and send them to your engineering team.</p></div>
                                    <button onClick={() => setShowExportModal(false)} className="p-2 hover:bg-slate-100 rounded-full transition-colors"><Icon name="x" size={24} /></button>
                                </div>
                                <div className="p-8 space-y-8">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        {['css', 'tailwind', 'json'].map((type) => (
                                            <div key={type} className="space-y-3">
                                                <div className="flex justify-between items-center"><span className="text-[10px] font-bold uppercase tracking-widest text-slate-400">{type}</span><button onClick={() => copyToClipboard(getExportData(type))} className="p-2 text-slate-400 hover:text-black transition-colors"><Icon name="copy" size={16} /></button></div>
                                                <pre className="bg-slate-50 p-4 rounded-2xl text-[10px] font-mono overflow-x-auto border border-slate-100 h-40">{getExportData(type)}</pre>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* API Key Modal */}
                    {showKeyModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setShowKeyModal(false)} />
                            <div className="relative bg-white w-full max-w-md rounded-[32px] shadow-2xl overflow-hidden animate-in zoom-in-95 duration-200 p-8">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-bold text-xl flex items-center gap-2"><Icon name="key" size={20} className="text-blue-500"/> Connect AI Engine</h3>
                                    <button onClick={() => setShowKeyModal(false)} className="p-2 hover:bg-slate-100 rounded-full transition-colors"><Icon name="x" size={20} /></button>
                                </div>
                                <div className="space-y-4">
                                    <p className="text-sm text-slate-600 leading-relaxed">
                                        To use the AI Palette Generator, you need a free Gemini API key. This key is saved <strong>only in your browser</strong> and is never sent to Square's servers.
                                    </p>
                                    <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 text-xs text-slate-500 mb-4">
                                        <ol className="list-decimal pl-4 space-y-1">
                                            <li>Go to <a href="[https://aistudio.google.com/](https://aistudio.google.com/)" target="_blank" className="text-blue-500 hover:underline">Google AI Studio</a>.</li>
                                            <li>Sign in and click "Get API key".</li>
                                            <li>Paste it below.</li>
                                        </ol>
                                    </div>
                                    <input 
                                        type="password" 
                                        placeholder="AIzaSy..." 
                                        className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-black font-mono text-sm"
                                        value={tempKeyInput}
                                        onChange={(e) => setTempKeyInput(e.target.value)}
                                    />
                                    <button 
                                        onClick={saveApiKey}
                                        disabled={!tempKeyInput.trim()}
                                        className="w-full py-3 bg-black text-white rounded-2xl font-bold hover:bg-slate-800 disabled:opacity-50 transition-all"
                                    >
                                        Save Key Securely
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {toastMsg && (
                        <div className="fixed bottom-8 left-1/2 -translate-x-1/2 bg-black text-white px-8 py-4 rounded-full flex items-center gap-4 shadow-2xl z-[60] font-bold text-sm tracking-wide">
                           {toastMsg}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
