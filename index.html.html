const TONES = [
  { id:"vivid",    label:"Vivid",    desc:"Full saturation — bold, energetic",         sMult:1.0,  lShift:0  },
  { id:"balanced", label:"Balanced", desc:"Natural saturation — clean & versatile",    sMult:0.75, lShift:5  },

function hexToHsl(hex){
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h,s,l=(mx+mn)/2;
  if(mx===mn){h=s=0;}else{const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);
    switch(mx){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}}
  return[h*360,s*100,l*100];
}
function hslToHex(h,s,l){
  h=((h%360)+360)%360;s=Math.max(0,Math.min(100,s));l=Math.max(0,Math.min(100,l));s/=100;l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');};
  return`#${f(0)}${f(8)}${f(4)}`;
}
function lum(hex){
  if(!hex||hex.length<7)return 0.5;
  const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  return .299*r+.587*g+.114*b;
}
function applyTone(h,s,l,toneId){
  const t=TONES.find(x=>x.id===toneId)||TONES[0];
  const ns=Math.max(0,Math.min(100,s*t.sMult));
  const nl=Math.max(0,Math.min(96,l+t.lShift));
  return[h,ns,nl];
}
function generateSuggestions(colors,rule,toneId="balanced"){
  if(!colors.length)return[];
  const slots=Math.max(0,5-colors.length); // total palette capped at 5
  if(slots===0)return[];
  const avg=colors.reduce((a,c)=>{const[h,s,l]=hexToHsl(c);return[a[0]+h,a[1]+s,a[2]+l];},[0,0,0]).map(v=>v/colors.length);
  const[h,s,l]=avg;
  const T=([hh,ss,ll])=>hslToHex(...applyTone(hh,ss,ll,toneId));
  const all=[];
  switch(rule){
    case"complementary":all.push(T([h+180,s,l]),T([h+180,s*.7,Math.min(l+15,90)]),T([h+180,s*.4,Math.min(l+25,95)]));break;
    case"triadic":all.push(T([h+120,s,l]),T([h+240,s,l]),T([h+180,s*.5,Math.min(l+20,90)]));break;
    case"analogous":all.push(T([h+30,s,l]),T([h-30,s,l]),T([h+15,s*.8,Math.min(l+10,90)]));break;
    case"split":all.push(T([h+150,s,l]),T([h+210,s,l]),T([h+180,s*.5,Math.min(l+20,90)]));break;
    case"tetradic":all.push(T([h+90,s,l]),T([h+180,s,l]),T([h+270,s,l]));break;
    default:break;
  }
  return all.slice(0,slots);
}
function cp(text){try{navigator.clipboard.writeText(text);}catch{}}

// Draw palette card to canvas and trigger PNG download
function downloadPalette(colors, rule, name){
  const W=900, H=320, PAD=40, CHIP=100;
  const canvas=document.createElement("canvas");
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext("2d");
  // Background
  ctx.fillStyle="#0F0B08";
  ctx.fillRect(0,0,W,H);
  // Title
  ctx.font="bold 13px 'Outfit', sans-serif";
  ctx.fillStyle="#5C4A42";
  ctx.letterSpacing="3px";
  ctx.fillText("SQUARE COLOUR STUDIO", PAD, 38);
  ctx.font="300 11px 'Outfit', sans-serif";
  ctx.fillStyle="#3D2B24";
  ctx.fillText(name||`${rule} palette`, PAD, 58);
  // Color chips
  const total=colors.length;
  const startX=PAD;
  const chipW=Math.floor((W-PAD*2-((total-1)*12))/total);
  colors.forEach((c,i)=>{
    const x=startX+i*(chipW+12);
    const y=76;
    const h=160;
    ctx.fillStyle=c;
    ctx.beginPath();
    ctx.roundRect(x,y,chipW,h,10);
    ctx.fill();
    // hex label
    ctx.font="bold 10px monospace";
    ctx.fillStyle=lum(c)>.5?"#111111":"#FFFFFF";
    ctx.globalAlpha=0.75;
    const label=c.toUpperCase();
    const tw=ctx.measureText(label).width;
    ctx.fillText(label,x+(chipW-tw)/2,y+h-14);
    ctx.globalAlpha=1;
    // role label
    ctx.font="500 9px 'Outfit', sans-serif";
    ctx.fillStyle="#5C4A42";
    const role=i<(total-3)?"BASE":"SUGG";
    const rw=ctx.measureText(role).width;
    ctx.fillText(role,x+(chipW-rw)/2,y+h+18);
  });
  // Footer
  ctx.font="600 10px 'Outfit', sans-serif";
  ctx.fillStyle="#2A1A10";
  ctx.fillText("squarecs.studio", PAD, H-18);
  ctx.font="300 10px 'Outfit', sans-serif";
  ctx.fillText(new Date().toLocaleDateString("en-GB",{year:"numeric",month:"long",day:"numeric"}), W-PAD-160, H-18);
  // Download
  const a=document.createElement("a");
  a.download=`square-palette-${Date.now()}.png`;
  a.href=canvas.toDataURL("image/png");
  a.click();
}

function App(){
  const[selected,setSelected]=useState([]);
  const[rule,setRule]=useState("complementary");
  const[tone,setTone]=useState("balanced");
  const[suggestions,setSuggestions]=useState([]);
  const[generated,setGenerated]=useState(false);
  const[loading,setLoading]=useState(false);
  const[insightLoading,setInsightLoading]=useState(false);
  const[aiInsight,setAiInsight]=useState("");
  const[toast,setToast]=useState({visible:false,message:""});
  const[hoveredSwatch,setHoveredSwatch]=useState(null);
  const[showSlides,setShowSlides]=useState(false);
  const[savedPalettes,setSavedPalettes]=useState([]);
  const[showSaved,setShowSaved]=useState(false);
  const[paletteName,setPaletteName]=useState("");
  const[nameMode,setNameMode]=useState(false);
  const timerRef=useRef(null);

  // Load saved palettes from storage on mount
  useEffect(()=>{
    (async()=>{
      try{
        const raw=localStorage.getItem("sq-palettes");
        if(raw)setSavedPalettes(JSON.parse(raw)||[]);
      }catch{}
    })();
  },[]);

  const showToast=msg=>{
    if(timerRef.current)clearTimeout(timerRef.current);
    setToast({visible:true,message:msg});
    timerRef.current=setTimeout(()=>setToast(t=>({...t,visible:false})),2200);
  };

  // Reset palette when tone or rule changes so stale preview never lingers
  useEffect(()=>{
    if(generated){ setGenerated(false);setSuggestions([]);setAiInsight(""); }
  },[tone,rule]);

  const toggleColor=color=>{
    setSelected(prev=>{
      if(prev.includes(color))return prev.filter(c=>c!==color);
      if(prev.length>=4)return prev;
      return[...prev,color];
    });
    setGenerated(false);setSuggestions([]);setAiInsight("");
  };

  const handleGenerate=useCallback(async()=>{
    if(!selected.length)return;
    setLoading(true);setGenerated(false);setAiInsight("");
    const sugg=generateSuggestions(selected,rule,tone);
    setSuggestions(sugg);
    setGenerated(true);setLoading(false);
    setInsightLoading(true);
    const prompt=`You are a colour consultant for architects and interior designers. Base colours: ${selected.join(", ")}. Harmony rule: ${rule}. Suggested additions: ${sugg.join(", ")}. In 2-3 sentences, describe the mood/atmosphere this palette creates and suggest ONE ideal use case (e.g. a hotel lobby, a residential living room, a product UI). Be evocative and specific. Use design language. No hex values.`;
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
      });
      const d=await res.json();
      setAiInsight(d.content?.map(b=>b.text||"").join("").trim()||"");
    }catch{}
    setInsightLoading(false);
  },[selected,rule,tone]);

  const allColors=[...selected,...suggestions];

  const savePalette=async()=>{
    if(!allColors.length)return;
    const name=paletteName.trim()||`Palette ${new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short"})}`;
    const entry={id:Date.now(),name,colors:allColors,rule,tone,base:selected,sugg:suggestions,insight:aiInsight};
    const updated=[entry,...savedPalettes].slice(0,20);
    setSavedPalettes(updated);
    setNameMode(false);setPaletteName("");
    try{ localStorage.setItem("sq-palettes",JSON.stringify(updated)); }catch{}
    showToast(`"${name}" saved!`);
  };

  const deletePalette=async(id)=>{
    const updated=savedPalettes.filter(p=>p.id!==id);
    setSavedPalettes(updated);
    try{ localStorage.setItem("sq-palettes",JSON.stringify(updated)); }catch{}
    showToast("Palette removed");
  };

  const loadPalette=p=>{
    setSelected(p.base);setSuggestions(p.sugg);setRule(p.rule);
    setAiInsight(p.insight||"");setGenerated(true);
    setShowSaved(false);showToast(`"${p.name}" loaded`);
  };

  return(
    <div style={{minHeight:"100vh",background:"#0F0B08",fontFamily:"'Outfit',sans-serif",color:"#F5F0EB"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        ::-webkit-scrollbar{width:4px;}
        ::-webkit-scrollbar-track{background:#1a1008;}
        ::-webkit-scrollbar-thumb{background:#5C4A42;border-radius:2px;}
        .swatch-dot{width:36px;height:36px;border-radius:50%;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease;border:none;outline:none;flex-shrink:0;}

        .saved-card:hover{border-color:#5C4A42;}
      `}</style>

                  <div style={{width:24,height:24,borderRadius:5,background:allColors[2]||"#888",opacity:.85}}/>
                  <span style={{fontSize:12,fontWeight:700,color:lum(allColors[0])>.5?"#222":"#eee",letterSpacing:"0.08em"}}>STUDIO</span>
                </div>
                <div style={{display:"flex",gap:24}}>
                  {["Work","About","Services","Contact"].map(t=>(
                    <span key={t} style={{fontSize:11,fontWeight:400,color:lum(allColors[0])>.5?"#55555566":"#cccccc66",letterSpacing:"0.04em"}}>{t}</span>
                  ))}
                </div>
                {/* CTA pill — accent colour at 80% opacity */}
                <div style={{background:allColors[2]||"#888",opacity:.82,color:lum(allColors[2]||"#888")>.5?"#111":"#fff",padding:"7px 16px",borderRadius:40,fontSize:10,fontWeight:600,letterSpacing:"0.06em"}}>Get Started</div>
              </div>

              {/* HERO — very light tint of palette[1], not solid */}
              <div style={{background:`linear-gradient(160deg,${allColors[1]||"#eee"}28 0%,${allColors[0]||"#f8f6f2"} 55%)`,
                padding:"44px 36px 40px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:36,alignItems:"center"}}>
                <div>
                  {/* Tag — accent at 15% bg, accent text */}
                  <div style={{display:"inline-flex",alignItems:"center",gap:5,background:`${allColors[2]||"#888"}18`,
                    border:`1px solid ${allColors[2]||"#888"}30`,
                    color:allColors[2]||"#888",padding:"3px 10px",borderRadius:40,fontSize:9,fontWeight:600,letterSpacing:"0.1em",marginBottom:14,textTransform:"uppercase"}}>
                    New Collection
                  </div>
                  <div style={{fontSize:28,fontWeight:800,lineHeight:1.1,color:lum(allColors[0])>.5?"#1a1a1a":"#f0f0f0",marginBottom:12,letterSpacing:"-0.02em"}}>
                    Design with<br/>intention.
                  </div>
                  <p style={{fontSize:11,fontWeight:300,lineHeight:1.8,color:lum(allColors[0])>.5?"#666":"#aaa",marginBottom:22,maxWidth:240}}>
                    Spaces that breathe. Colours that speak. Architecture that endures.
                  </p>
                  <div style={{display:"flex",gap:10}}>
                    {/* Primary CTA — accent solid */}
                    <div style={{background:allColors[2]||"#888",color:lum(allColors[2]||"#888")>.5?"#111":"#fff",
                      padding:"10px 20px",borderRadius:7,fontSize:11,fontWeight:700,letterSpacing:"0.06em"}}>View Projects</div>
                    {/* Ghost CTA — just border */}
                    <div style={{border:`1.5px solid ${allColors[2]||"#888"}44`,
                      color:lum(allColors[0])>.5?"#555":"#bbb",
                      padding:"10px 20px",borderRadius:7,fontSize:11,fontWeight:400}}>Learn More</div>
                  </div>
                </div>
                {/* Hero visual — subtle, low-opacity shapes */}
                <div style={{position:"relative",height:180}}>
                  <div style={{position:"absolute",right:0,top:0,width:"82%",height:"90%",borderRadius:14,
                    background:allColors[1]||"#ddd",opacity:.45,boxShadow:"0 8px 32px rgba(0,0,0,0.08)"}}/>
                  <div style={{position:"absolute",right:"8%",top:"8%",width:"75%",height:"82%",borderRadius:12,
                    background:allColors[2]||"#aaa",opacity:.25}}/>
                  <div style={{position:"absolute",left:"4%",bottom:"8%",width:"44%",height:"52%",borderRadius:10,
                    background:allColors[3]||allColors[1]||"#bbb",opacity:.55,
                    border:`2px solid ${allColors[0]||"#fff"}`}}/>
                  <div style={{position:"absolute",right:"18%",top:"12%",width:28,height:28,borderRadius:"50%",
                    background:allColors[4]||allColors[2]||"#ccc",opacity:.4}}/>
                </div>
              </div>

              {/* CARDS — white bg, accent used only as small strip */}
              <div style={{padding:"28px 36px",background:lum(allColors[0])>.5?"#ffffff":"#141414"}}>
                <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.12em",
                  color:lum(allColors[0])>.5?"#aaaaaa":"#555555",textTransform:"uppercase",marginBottom:16}}>Featured Work</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
                  {[
                    {label:"Residential", sub:"Interior Design",  accent:allColors[2]},
                    {label:"Commercial",  sub:"Architecture",      accent:allColors[3]||allColors[2]},
                    {label:"Hospitality", sub:"Brand & Space",     accent:allColors[4]||allColors[1]},
                  ].map((card,i)=>(
                    <div key={i} style={{borderRadius:8,overflow:"hidden",border:`1px solid ${lum(allColors[0])>.5?"#e8e8e8":"#2a2a2a"}`}}>
                      {/* Coloured top strip — palette colour at reduced opacity */}
                      <div style={{height:56,background:card.accent||"#ccc",opacity:.55}}/>
                      <div style={{padding:"10px 12px",background:lum(allColors[0])>.5?"#fff":"#1c1c1c"}}>
                        <div style={{fontSize:11,fontWeight:700,color:lum(allColors[0])>.5?"#222":"#eee",marginBottom:2}}>{card.label}</div>
                        <div style={{fontSize:9,color:lum(allColors[0])>.5?"#aaa":"#666",marginBottom:7}}>{card.sub}</div>
                        <div style={{height:2,borderRadius:1,background:card.accent||"#ccc",width:"30%",opacity:.6}}/>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* STATS — very light tint, not solid accent */}
              <div style={{background:`${allColors[2]||"#888"}14`,borderTop:`1px solid ${allColors[2]||"#888"}18`,
                borderBottom:`1px solid ${allColors[2]||"#888"}18`,
                padding:"16px 36px",display:"flex",justifyContent:"space-around",alignItems:"center"}}>
                {[["18+","Years"],["240","Projects"],["12","Awards"],["4","Countries"]].map(([n,l],i)=>(
                  <div key={i} style={{textAlign:"center"}}>
                    <div style={{fontSize:20,fontWeight:800,lineHeight:1,color:allColors[2]||"#888"}}>{n}</div>
                    <div style={{fontSize:9,fontWeight:400,letterSpacing:"0.1em",textTransform:"uppercase",marginTop:3,
                      color:lum(allColors[0])>.5?"#aaa":"#666"}}>{l}</div>
                  </div>
                ))}
              </div>

              {/* FOOTER — base colour, very quiet */}
              <div style={{background:allColors[0],borderTop:`1px solid ${allColors[2]||"#ccc"}18`,
                padding:"14px 36px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span style={{fontSize:9,fontWeight:600,letterSpacing:"0.14em",textTransform:"uppercase",
                  color:lum(allColors[0])>.5?"#bbb":"#444"}}>© SQUARE CS 2025</span>
                <div style={{display:"flex",gap:16}}>
                  {["Instagram","Behance","LinkedIn"].map(s=>(
                    <span key={s} style={{fontSize:9,color:lum(allColors[0])>.5?"#ccc":"#444"}}>{s}</span>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* GOOGLE SLIDES MODAL */}
      {showSlides&&<SlidesModal colors={allColors} onClose={()=>setShowSlides(false)}/>}

      {/* TOAST */}
      <div style={{position:"fixed",bottom:32,left:"50%",transform:`translateX(-50%) translateY(${toast.visible?0:20}px)`,opacity:toast.visible?1:0,transition:"all .3s cubic-bezier(.4,0,.2,1)",background:"#1A1008",color:"#F5F0EB",padding:"10px 22px",borderRadius:40,fontSize:13,letterSpacing:"0.04em",boxShadow:"0 8px 32px rgba(0,0,0,0.25)",pointerEvents:"none",zIndex:1000}}>
        {toast.message}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
