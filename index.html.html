];

function hexToHsl(hex){
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h,s,l=(mx+mn)/2;
  if(mx===mn){h=s=0;}else{const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);
    switch(mx){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break;}}
  return[h*360,s*100,l*100];
}
function hslToHex(h,s,l){
  h=((h%360)+360)%360;s=Math.max(0,Math.min(100,s));l=Math.max(0,Math.min(100,l));s/=100;l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');};
  return`#${f(0)}${f(8)}${f(4)}`;
}
function lum(hex){
  if(!hex||hex.length<7)return 0.5;
  const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  return .299*r+.587*g+.114*b;
}
function applyTone(h,s,l,toneId){
  const t=TONES.find(x=>x.id===toneId)||TONES[0];
  const ns=Math.max(0,Math.min(100,s*t.sMult));
  const nl=Math.max(0,Math.min(96,l+t.lShift));
  return[h,ns,nl];
}
function generateSuggestions(colors,rule,toneId="balanced"){
  if(!colors.length)return[];
  const slots=Math.max(0,5-colors.length); // total palette capped at 5
  if(slots===0)return[];
  const avg=colors.reduce((a,c)=>{const[h,s,l]=hexToHsl(c);return[a[0]+h,a[1]+s,a[2]+l];},[0,0,0]).map(v=>v/colors.length);
  const[h,s,l]=avg;
  const Tx=([hh,ss,ll])=>hslToHex(...applyTone(hh,ss,ll,toneId));
  const all=[];
  switch(rule){
    case"complementary":all.push(Tx([h+180,s,l]),Tx([h+180,s*.7,Math.min(l+15,90)]),Tx([h+180,s*.4,Math.min(l+25,95)]));break;
    case"triadic":all.push(Tx([h+120,s,l]),Tx([h+240,s,l]),Tx([h+180,s*.5,Math.min(l+20,90)]));break;
    case"analogous":all.push(Tx([h+30,s,l]),Tx([h-30,s,l]),Tx([h+15,s*.8,Math.min(l+10,90)]));break;
    case"split":all.push(Tx([h+150,s,l]),Tx([h+210,s,l]),Tx([h+180,s*.5,Math.min(l+20,90)]));break;
    case"tetradic":all.push(Tx([h+90,s,l]),Tx([h+180,s,l]),Tx([h+270,s,l]));break;
    default:break;
  }
  return all.slice(0,slots);
}

// Colour proportion guide — based on 60-30-10 rule extended for 5 colours.
// Logic: sort by luminance (lightest = dominant background colour),
// then assign roles and proportions by design convention.
function getProportions(colors){
  if(!colors.length) return [];
  // Score each colour: luminance + index position weight
  const scored = colors.map((hex,i)=>{
    const l = lum(hex);
    const[,s]=hexToHsl(hex);
    return {hex, i, lum:l, sat:s};
  });
  // Sort: lightest/least saturated first (dominant), darkest/most saturated last (accent)
  const sorted=[...scored].sort((a,b)=>(b.lum-b.sat*.01)-(a.lum-a.sat*.01));

  const ROLES = [
    { pct:60, role:"Dominant",      use:"Backgrounds, large surfaces, walls",          rule:"60%",  tip:"The neutral anchor — sets the overall mood" },
    { pct:25, role:"Secondary",     use:"Secondary surfaces, sidebars, cards",          rule:"25%",  tip:"Supports the dominant without competing" },
    { pct:10, role:"Accent",        use:"Buttons, highlights, key UI elements",         rule:"10%",  tip:"The visual hook — use sparingly for impact" },
    { pct:4,  role:"Supporting",    use:"Borders, dividers, subtle details",            rule:"4%",   tip:"Structural colour — keeps layouts grounded" },
    { pct:1,  role:"Pop / Detail",  use:"Icons, micro-interactions, focal points",      rule:"1%",   tip:"Maximum contrast — the smallest but boldest touch" },
  ];

  return sorted.map((s,i)=>({
    ...s,
    ...ROLES[i]||{pct:1,role:"Detail",use:"Accents",rule:"<1%",tip:"Use very sparingly"},
  }));
}

// Draw palette card to canvas and trigger PNG download
function downloadPalette(colors, rule, name){
  const W=900, H=320, PAD=40, CHIP=100;
  const canvas=document.createElement("canvas");
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext("2d");
  // Background
  ctx.fillStyle="#F5F2EE";
  ctx.fillRect(0,0,W,H);
  // Title
  ctx.font="bold 13px 'Outfit', sans-serif";
  ctx.fillStyle="#9A8878";
  ctx.letterSpacing="3px";
  ctx.fillText("SQUARE COLOUR STUDIO", PAD, 38);
  ctx.font="300 11px 'Outfit', sans-serif";
  ctx.fillStyle="#B8AFA8";
  ctx.fillText(name||`${rule} palette`, PAD, 58);
  // Color chips
  const total=colors.length;
  const startX=PAD;
  const chipW=Math.floor((W-PAD*2-((total-1)*12))/total);
  colors.forEach((c,i)=>{
    const x=startX+i*(chipW+12);
    const y=76;
    const h=160;
    ctx.fillStyle=c;
    ctx.beginPath();
    ctx.roundRect(x,y,chipW,h,10);
    ctx.fill();
    // hex label
    ctx.font="bold 10px monospace";
    ctx.fillStyle=lum(c)>.5?"#111111":"#FFFFFF";
    ctx.globalAlpha=0.75;
    const label=c.toUpperCase();
    const tw=ctx.measureText(label).width;
    ctx.fillText(label,x+(chipW-tw)/2,y+h-14);
    ctx.globalAlpha=1;
    // role label
    ctx.font="500 9px 'Outfit', sans-serif";
    ctx.fillStyle="#9A8878";
    const role=i<(total-3)?"BASE":"SUGG";
    const rw=ctx.measureText(role).width;
    ctx.fillText(role,x+(chipW-rw)/2,y+h+18);
  });
  // Footer
  ctx.font="600 10px 'Outfit', sans-serif";
  ctx.fillStyle="#D4CEC8";
  ctx.fillText("squarecs.studio", PAD, H-18);
  ctx.font="300 10px 'Outfit', sans-serif";
  ctx.fillText(new Date().toLocaleDateString("en-GB",{year:"numeric",month:"long",day:"numeric"}), W-PAD-160, H-18);
  // Download
  const a=document.createElement("a");
  a.download=`square-palette-${Date.now()}.png`;
  a.href=canvas.toDataURL("image/png");
  a.click();
}

      <div style={{background:"#F5F2EE",borderRadius:16,border:"1px solid #B8AFA8",width:"100%",maxWidth:560,maxHeight:"90vh",overflowY:"auto",
        boxShadow:"0 32px 80px rgba(0,0,0,0.7)"}}>
        {/* Header */}
        <div style={{padding:"24px 28px 20px",borderBottom:"1px solid #E2DDD8",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontFamily:"'Outfit',sans-serif",fontSize:10,color:"#8A6858",letterSpacing:"0.14em",textTransform:"uppercase",fontWeight:600,marginBottom:4}}>
              ▣ Google Slides Guide
            </div>
            <div style={{fontFamily:"'Outfit',sans-serif",fontSize:18,fontWeight:700,color:"#1A1410"}}>
              Apply your palette to Slides
            </div>
          </div>
          <button onClick={onClose} style={{background:"#E2DDD8",border:"1px solid #B8AFA8",color:"#7A6860",width:32,height:32,borderRadius:"50%",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>

        {/* Step progress */}
        <div style={{padding:"16px 28px 0",display:"flex",gap:6}}>
          {steps.map((st,i)=>(
            <div key={i} onClick={()=>setStep(i)} style={{flex:1,height:3,borderRadius:2,cursor:"pointer",
              background:i<=step?"#B5703A":"#D4CEC8",transition:"background 0.2s"}}/>
          ))}
        </div>

        {/* Step content */}
        <div style={{padding:"24px 28px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
            <div style={{width:36,height:36,borderRadius:10,background:"#E2DDD8",border:"1px solid #B8AFA8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
              {s.icon}
            </div>
            <div>
              <div style={{fontFamily:"'Outfit',sans-serif",fontSize:9,color:"#9A8878",letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:600}}>
                Step {step+1} of {steps.length}
              </div>
              <div style={{fontFamily:"'Outfit',sans-serif",fontSize:16,fontWeight:700,color:"#1A1410"}}>{s.title}</div>
            </div>
          </div>
          <p style={{fontFamily:"'Outfit',sans-serif",fontSize:13,fontWeight:300,color:"#9A8878",lineHeight:1.7,marginBottom:20}}>
            {s.desc}
          </p>
          {s.visual}
        </div>

        {/* Copy + Nav */}
        <div style={{padding:"16px 28px 24px",borderTop:"1px solid #E2DDD8",display:"flex",gap:10,justifyContent:"space-between",alignItems:"center"}}>
          <button onClick={()=>{ cp(colors.map((c,i)=>`Slot ${i+1}: ${c}`).join("\n")); }}
            style={{background:"#E2DDD8",border:"1px solid #B8AFA8",color:"#9A8878",padding:"9px 16px",borderRadius:8,cursor:"pointer",
              fontFamily:"'Outfit',sans-serif",fontSize:11,fontWeight:500,letterSpacing:"0.04em"}}>
            Copy all HEX codes
          </button>
          <div style={{display:"flex",gap:8}}>
            {step>0&&(
              <button onClick={()=>setStep(s=>s-1)}
                style={{background:"#E2DDD8",border:"1px solid #B8AFA8",color:"#9A8878",padding:"9px 18px",borderRadius:8,cursor:"pointer",
                  fontFamily:"'Outfit',sans-serif",fontSize:11,fontWeight:500}}>
                ← Back
              </button>
            )}
            {step<steps.length-1?(
              <button onClick={()=>setStep(s=>s+1)}
                style={{background:"#B5703A",border:"none",color:"#F5F2EE",padding:"9px 22px",borderRadius:8,cursor:"pointer",
                  fontFamily:"'Outfit',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.08em"}}>
                Next →
              </button>
            ):(
              <button onClick={onClose}
                style={{background:"#B5703A",border:"none",color:"#F5F2EE",padding:"9px 22px",borderRadius:8,cursor:"pointer",
                  fontFamily:"'Outfit',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.08em"}}>
                Done ✓
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// In-memory palette store — fallback when localStorage is blocked (e.g. Edge local files)
var _memStore = {};
function storeSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} _memStore[k]=v; }
function storeGet(k){ try{ var v=localStorage.getItem(k); if(v!==null)return v; }catch(e){} return _memStore[k]||null; }

function App(){
  const[dark,setDark]=useState(false);
  const T=dark?DARK:LIGHT;
  const[selected,setSelected]=useState([]);
  const[rule,setRule]=useState("complementary");
  const[tone,setTone]=useState("balanced");
  const[suggestions,setSuggestions]=useState([]);
  const[generated,setGenerated]=useState(false);
  const[loading,setLoading]=useState(false);
  const[insightLoading,setInsightLoading]=useState(false);
  const[aiInsight,setAiInsight]=useState("");
  const[toast,setToast]=useState({visible:false,message:""});
  const[hoveredSwatch,setHoveredSwatch]=useState(null);
  const[savedPalettes,setSavedPalettes]=useState([]);
  const[showSaved,setShowSaved]=useState(false);
  const[paletteName,setPaletteName]=useState("");
  const[nameMode,setNameMode]=useState(false);
  const timerRef=useRef(null);

  // Load saved palettes from storage on mount
  useEffect(()=>{
    (async()=>{
      try{
        const res=await window.storage.get("sq-palettes");
        if(res)setSavedPalettes(JSON.parse(res.value)||[]);
      }catch{}
    })();
  },[]);

  const showToast=msg=>{
    if(timerRef.current)clearTimeout(timerRef.current);
    setToast({visible:true,message:msg});
    timerRef.current=setTimeout(()=>setToast(t=>({...t,visible:false})),2200);
  };

  // Reset palette when tone or rule changes so stale preview never lingers
  useEffect(()=>{
    if(generated){ setGenerated(false);setSuggestions([]);setAiInsight(""); }
  },[tone,rule]);

  const toggleColor=color=>{
    setSelected(prev=>{
      if(prev.includes(color))return prev.filter(c=>c!==color);
      if(prev.length>=4)return prev;
      return[...prev,color];
    });
    setGenerated(false);setSuggestions([]);setAiInsight("");
  };

  const handleGenerate=useCallback(async()=>{
    if(!selected.length)return;
    setLoading(true);setGenerated(false);setAiInsight("");
    const sugg=generateSuggestions(selected,rule,tone);
    setSuggestions(sugg);
    setGenerated(true);setLoading(false);
    setInsightLoading(true);
    const prompt=`You are a colour consultant for architects and interior designers. Base colours: ${selected.join(", ")}. Harmony rule: ${rule}. Suggested additions: ${sugg.join(", ")}. In 2-3 sentences, describe the mood/atmosphere this palette creates and suggest ONE ideal use case (e.g. a hotel lobby, a residential living room, a product UI). Be evocative and specific. Use design language. No hex values.`;
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
      });
      const d=await res.json();
      setAiInsight(d.content?.map(b=>b.text||"").join("").trim()||"");
    }catch{}
    setInsightLoading(false);
  },[selected,rule,tone]);

  const allColors=[...selected,...suggestions];

  const savePalette=async()=>{
    if(!allColors.length)return;
    const name=paletteName.trim()||`Palette ${new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short"})}`;
    const entry={id:Date.now(),name,colors:allColors,rule,tone,base:selected,sugg:suggestions,insight:aiInsight};
    const updated=[entry,...savedPalettes].slice(0,20);
    setSavedPalettes(updated);
    setNameMode(false);setPaletteName("");
    try{ await window.storage.set("sq-palettes",JSON.stringify(updated)); }catch{}
    showToast(`"${name}" saved!`);
  };

  const deletePalette=async(id)=>{
    const updated=savedPalettes.filter(p=>p.id!==id);
    setSavedPalettes(updated);
    try{ await window.storage.set("sq-palettes",JSON.stringify(updated)); }catch{}
    showToast("Palette removed");
  };

  const loadPalette=p=>{
    setSelected(p.base);setSuggestions(p.sugg);setRule(p.rule);
    setAiInsight(p.insight||"");setGenerated(true);
    setShowSaved(false);showToast(`"${p.name}" loaded`);
  };

  return(
    <div style={{minHeight:"100vh",background:T.pageBg,fontFamily:"'Outfit',sans-serif",color:T.textPrimary,transition:"background .3s,color .3s"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        ::-webkit-scrollbar{width:4px;}
        ::-webkit-scrollbar-track{background:${T.scrollTrack};}
        ::-webkit-scrollbar-thumb{background:${T.scrollThumb};border-radius:2px;}
        .swatch-dot{width:36px;height:36px;border-radius:50%;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease;border:none;outline:none;flex-shrink:0;}
        .swatch-dot:hover{transform:scale(1.28);z-index:2;position:relative;}
        .swatch-dot.sel{transform:scale(1.18);box-shadow:0 0 0 2px ${T.swatchGap},0 0 0 4px ${T.swatchRing} !important;z-index:5;position:relative;}
        .rule-btn{padding:8px 16px;border-radius:40px;border:1px solid ${T.ruleBtnBorder};background:transparent;color:${T.ruleBtnText};cursor:pointer;font-family:'Outfit',sans-serif;font-size:11px;font-weight:500;letter-spacing:.06em;transition:all .2s ease;white-space:nowrap;}
        .rule-btn:hover{border-color:${T.ruleBtnHoverBorder};color:${T.ruleBtnHoverText};}
        .rule-btn.active{background:${T.ruleBtnActiveBg};border-color:${T.ruleBtnActiveBorder};color:${T.ruleBtnActiveText};}
        .gen-btn{background:${T.accent};color:#ffffff;border:none;padding:14px 36px;border-radius:40px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;letter-spacing:.12em;transition:all .2s ease;text-transform:uppercase;}
        .gen-btn:hover:not(:disabled){background:${T.accentHover};transform:translateY(-1px);box-shadow:0 8px 24px rgba(200,135,74,.3);}
        .gen-btn:disabled{opacity:.4;cursor:not-allowed;}
        .chip{position:relative;border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .2s ease;}
        .chip:hover{transform:scale(1.06);}
        .action-btn{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:8px;background:${T.actionBg};border:1px solid ${T.actionBorder};color:${T.actionText};cursor:pointer;font-family:'Outfit',sans-serif;font-size:11px;letter-spacing:.04em;transition:all .2s;font-weight:500;text-align:left;width:100%;}
        .action-btn:hover{border-color:${T.actionHoverBorder};color:${T.actionHoverText};background:${T.actionHoverBg};}
        .action-btn.highlight{border-color:${T.highlightBorder};background:${T.highlightBg};color:${T.highlightText};}
        .action-btn.highlight:hover{background:${T.actionHoverBg};}
        .divider{height:1px;background:linear-gradient(90deg,transparent,${T.divider},transparent);}
        @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        .fade-up{animation:fadeUp .35s ease forwards;}
        @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
        .saved-card{background:${T.savedCardBg};border:1px solid ${T.savedCardBorder};border-radius:10px;padding:12px;cursor:pointer;transition:border-color .15s;}
        .saved-card:hover{border-color:${T.savedCardBorderHover};}
      `}</style>

      {/* HEADER */}
      <div style={{padding:"36px 48px 28px",borderBottom:"1px solid #E2DDD8"}}>
        <div style={{marginBottom:6,fontSize:11,color:T.labelMid,letterSpacing:"0.15em",textTransform:"uppercase",fontWeight:500}}>◆ Colour Intelligence</div>
        <div style={{display:"flex",alignItems:"baseline",gap:12,marginBottom:6}}>
          <h1 style={{fontSize:48,fontWeight:800,letterSpacing:"-0.02em",lineHeight:1,color:T.textPrimary}}>SQUARE</h1>
          <h1 style={{fontSize:48,fontWeight:300,letterSpacing:"-0.01em",lineHeight:1,color:T.textMuted}}>Colour Studio</h1>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
          <p style={{fontSize:13,color:T.textMuted,fontWeight:300,letterSpacing:"0.04em"}}>for architects, interiors & UX designers</p>
          <button onClick={()=>setShowSaved(v=>!v)}
            style={{display:"flex",alignItems:"center",gap:6,background:showSaved?"#D4CEC8":"#E2DDD8",border:"1px solid #B8AFA8",
              color:showSaved?T.accent:T.textMuted,padding:"7px 14px",borderRadius:40,cursor:"pointer",
              fontFamily:"'Outfit',sans-serif",fontSize:10,fontWeight:600,letterSpacing:"0.1em",transition:"all .2s"}}>
            ⬡ Saved Palettes {savedPalettes.length>0&&`(${savedPalettes.length})`}
          </button>
          <button onClick={()=>setDark(d=>!d)}
            style={{display:"flex",alignItems:"center",gap:7,background:T.cardBg,
              border:`1px solid ${T.border2}`,color:T.textMuted,
              padding:"7px 14px",borderRadius:40,cursor:"pointer",
              fontFamily:"'Outfit',sans-serif",fontSize:11,fontWeight:600,
              letterSpacing:"0.08em",transition:"all .3s",marginLeft:8}}>
            {dark?"☀ Light":"◑ Dark"}
          </button>
        </div>
        <div style={{height:1,background:`linear-gradient(90deg,${T.divider},transparent)`,marginTop:20}}/>
      </div>

      {/* SAVED PALETTES DRAWER */}
      {showSaved&&(
        <div style={{background:T.drawerBg,borderBottom:`1px solid ${T.border2}`,padding:"24px 48px"}}>
          <div style={{fontSize:10,color:T.labelHi,letterSpacing:"0.14em",textTransform:"uppercase",fontWeight:600,marginBottom:16}}>Saved Palettes</div>
          {savedPalettes.length===0?(
            <div style={{fontStyle:"italic",fontSize:13,color:T.textDim,fontWeight:300}}>No saved palettes yet — generate one and save it below.</div>
          ):(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12}}>
              {savedPalettes.map(p=>(
                <div key={p.id} className="saved-card">
                  <div style={{display:"flex",gap:3,marginBottom:10,borderRadius:6,overflow:"hidden",height:28}}>
                    {p.colors.map((c,i)=><div key={i} style={{flex:1,background:c}}/>)}
                  </div>
                  <div style={{fontSize:11,fontWeight:600,color:T.textSecondary,marginBottom:2}}>{p.name}</div>
                  <div style={{fontSize:9,color:T.textDim,letterSpacing:"0.06em",marginBottom:10}}>{p.rule.toUpperCase()} · {p.colors.length} colours</div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>loadPalette(p)} style={{flex:1,background:"#E2DDD8",border:"1px solid #B8AFA8",color:"#9A8878",padding:"5px 0",borderRadius:6,cursor:"pointer",fontSize:10,fontFamily:"'Outfit',sans-serif",fontWeight:500}}>Load</button>
                    <button onClick={()=>{cp(p.colors.join(", "));showToast("HEX copied!");}} style={{flex:1,background:"#E2DDD8",border:"1px solid #B8AFA8",color:"#9A8878",padding:"5px 0",borderRadius:6,cursor:"pointer",fontSize:10,fontFamily:"'Outfit',sans-serif",fontWeight:500}}>Copy</button>
                    <button onClick={()=>deletePalette(p.id)} style={{background:"#E2DDD8",border:"1px solid #D4CEC8",color:"#9A8878",padding:"5px 10px",borderRadius:6,cursor:"pointer",fontSize:10,fontFamily:"'Outfit',sans-serif"}}>✕</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"1fr 380px",minHeight:"calc(100vh - 160px)"}}>

        {/* LEFT */}
        <div style={{padding:"36px 48px",borderRight:"1px solid #E2DDD8",overflowY:"auto"}}>

          {/* Selected */}
          <div style={{marginBottom:32}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <span style={{fontSize:10,color:"#8A6858",letterSpacing:"0.14em",textTransform:"uppercase",fontWeight:600}}>Selected — {selected.length} / 4</span>
              {selected.length>0&&<button onClick={()=>{setSelected([]);setSuggestions([]);setGenerated(false);setAiInsight("");}} style={{background:"none",border:"none",color:"#9A8878",cursor:"pointer",fontSize:10,letterSpacing:"0.1em",fontWeight:500}}>CLEAR ALL</button>}
            </div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap",minHeight:60}}>
              {selected.length===0
                ?<div style={{fontWeight:300,color:T.textDim,fontSize:14,lineHeight:"60px",fontStyle:"italic"}}>Pick colours from the swatch below…</div>
                :selected.map(c=>(
                  <div key={c} onClick={()=>toggleColor(c)} style={{width:56,height:56,borderRadius:10,background:c,cursor:"pointer",position:"relative",transition:"transform .15s",boxShadow:`0 4px 16px ${c}55`}} title={`Remove ${c}`}>
                    <div style={{position:"absolute",inset:0,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",opacity:0,background:"rgba(0,0,0,0.4)",transition:"opacity .15s",fontSize:18}} onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0}>×</div>
                    <div style={{position:"absolute",bottom:-20,left:"50%",transform:"translateX(-50%)",fontSize:9,color:T.textDim,whiteSpace:"nowrap",fontWeight:400}}>{c}</div>
                  </div>
                ))
              }
            </div>
          </div>

          <div className="divider" style={{marginBottom:28}}/>

          {/* Harmony */}
          <div style={{marginBottom:28}}>
            <div style={{fontSize:10,color:"#9A8878",letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:12,fontWeight:600}}>Harmony Rule</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {HARMONY_RULES.map(r=>(
                <button key={r.id} className={`rule-btn ${rule===r.id?"active":""}`} onClick={()=>setRule(r.id)} title={r.desc}>{r.label}</button>
              ))}
            </div>
            <div style={{marginTop:8,fontWeight:300,color:T.textMuted,fontSize:13,fontStyle:"italic"}}>{HARMONY_RULES.find(r=>r.id===rule)?.desc}</div>
          </div>


          {/* Tone */}
          <div style={{marginBottom:28}}>
            <div style={{fontSize:10,color:"#9A8878",letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:12,fontWeight:600}}>Colour Tone</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
              {TONES.map(t=>(
                <button key={t.id} onClick={()=>setTone(t.id)}
                  style={{padding:"10px 8px",borderRadius:8,border:`1px solid ${tone===t.id?"#2A1A10":"#C8C0B8"}`,
                    background:tone===t.id?"#2A1A10":"transparent",cursor:"pointer",transition:"all .15s",textAlign:"center"}}>

                      <div key={i} style={{textAlign:"center"}}>
                        {/* Number — ACCENT colour (10%) */}
                        <div style={{fontSize:22,fontWeight:800,lineHeight:1,color:accent}}>{n}</div>
                        {/* Label — SUPPORT colour (4%) */}
                        <div style={{fontSize:9,fontWeight:500,letterSpacing:"0.1em",textTransform:"uppercase",
                          marginTop:3,color:support}}>{l}</div>
                      </div>
                    ))}
                  </div>

                  {/* FOOTER — DOMINANT bg (60%). Support text. Pop dot. */}
                  <div style={{background:dominant,borderTop:`1px solid ${support}44`,
                    padding:"14px 36px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      {/* Pop dot in footer — 1% */}
                      <div style={{width:6,height:6,borderRadius:"50%",background:pop}}/>
                      <span style={{fontSize:9,fontWeight:600,letterSpacing:"0.14em",textTransform:"uppercase",
                        color:`${domText}55`}}>© SQUARE CS 2025</span>
                    </div>
                    <div style={{display:"flex",gap:16}}>
                      {["Instagram","Behance","LinkedIn"].map(s=>(
                        <span key={s} style={{fontSize:9,color:`${domText}44`}}>{s}</span>
                      ))}
                    </div>
                  </div>

                </div>
              );
            })()}
          </div>
        </div>
      )}


      {/* TOAST */}
      <div style={{position:"fixed",bottom:32,left:"50%",transform:`translateX(-50%) translateY(${toast.visible?0:20}px)`,opacity:toast.visible?1:0,transition:"all .3s cubic-bezier(.4,0,.2,1)",background:"#E2DDD8",color:"#1A1410",padding:"10px 22px",borderRadius:40,fontSize:13,letterSpacing:"0.04em",boxShadow:"0 8px 32px rgba(0,0,0,0.25)",pointerEvents:"none",zIndex:1000}}>
        {toast.message}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
